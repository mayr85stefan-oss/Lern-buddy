<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Master Lern-App v134 Final (Restore)</title>
<style>
:root{
  --bg:#f6f8fc; --card:#fff; --text:#1f2937; --muted:#6b7280; --border:#dbe2ea;
  --dark:#0f172a; --accent:#eef2ff; --good:#ecfdf5; --mid:#fff7ed; --bad:#fef2f2; --red:#c1121f;
}
*{box-sizing:border-box}
html,body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none}
.wrap{max-width:1240px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);position:relative}
.grid{display:grid;gap:12px}.grid2{grid-template-columns:290px 1fr}.grid2a{grid-template-columns:repeat(2,minmax(0,1fr))}.grid4{grid-template-columns:repeat(4,minmax(0,1fr))}
@media (max-width:950px){.grid2,.grid2a,.grid4{grid-template-columns:1fr}}
.row{display:flex;gap:10px;flex-wrap:wrap}.muted{color:var(--muted);font-size:14px}
.badge{display:inline-block;background:var(--accent);border-radius:999px;padding:6px 10px;font-size:13px}
button,input,select,textarea{font:inherit;border-radius:14px;padding:12px 14px}
button{border:1px solid var(--border);background:#fff;cursor:pointer} button.primary{background:var(--dark);color:#fff;border-color:var(--dark)}
input,select,textarea{width:100%;border:1px solid var(--border);background:#fff}
.tabbar{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;border:1px solid var(--border);padding:6px;border-radius:16px;background:#fff}
.tab.active{background:var(--dark);color:#fff}.hidden{display:none!important}
.focusQuestion{background:#fff;border:1px solid var(--border);border-radius:18px;padding:14px;box-shadow:0 4px 14px rgba(0,0,0,.05);position:sticky;top:8px;z-index:10;min-height:80px;display:flex;align-items:center;justify-content:center;text-align:center}
.option{display:block;width:100%;text-align:left;border:1px solid var(--border);margin:0 0 10px;background:#fff;transition:0.2s}
.option.active{background:#e2e8f0}.option.correct{background:var(--good);border-color:#10b981}.option.wrong{background:var(--bad);border-color:#ef4444}
.canvasWrap{border:1px solid var(--border);border-radius:18px;overflow:hidden;background:#fff;margin-top:10px}
.canvasToolbar{display:flex;gap:8px;padding:10px;background:#f8fafc;border-bottom:1px solid var(--border);flex-wrap:wrap}
.canvasViewport{position:relative;width:100%;height:450px;overflow:hidden;touch-action:none;background:#fff}
#drawCanvas{position:absolute;left:0;top:0;background:#fff;transform-origin:0 0;touch-action:none}
.topicItem{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--border);padding:12px;border-radius:14px;margin-bottom:10px}
#syncStatusBadge{position:absolute;top:16px;right:16px;font-weight:700}
.ratingRow{display:flex;gap:8px;margin-top:12px}.ratingBtn{flex:1;border-radius:999px;padding:10px;font-weight:700;border:1px solid var(--border)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div id="syncStatusBadge" class="badge">Lokal</div>
    <h1>Master Lern-App v134</h1>
    <div class="muted">RESTORE: v127 Logic + Cloud Fix & Multi-JSON.</div>
    <div class="row" style="margin-top:10px">
      <div class="badge" id="pointsBadge">0 Punkte</div>
      <div class="badge" id="accBadge">Quote: 0%</div>
      <div class="badge" id="countsBadge">Gewusst 0 · Gesamt 0</div>
    </div>
  </div>

  <div class="grid grid2">
    <div class="card">
      <h3>Profile & Cloud</h3>
      <div id="profiles"></div>
      <hr style="margin:15px 0;border:0;border-top:1px solid var(--border)">
      <input type="text" id="syncIdInput" placeholder="Deine ID (z.B. JasminSelina)">
      <button class="primary" id="saveSyncIdBtn" style="width:100%;margin-top:8px">ID Koppeln & Laden</button>
      <hr style="margin:15px 0;border:0;border-top:1px solid var(--border)">
      <input id="geminiKey" type="password" placeholder="Gemini API Key...">
      <button id="saveKeysBtn" style="width:100%;margin-top:8px">Key speichern</button>
    </div>

    <div>
      <div class="card grid grid2a">
        <div><div class="muted">Oberthema</div><select id="areaSelect"></select></div>
        <div><div class="muted">Unterthema</div><select id="topicSelect"></select></div>
      </div>
      <div class="card">
        <div class="tabbar">
          <button class="tab active" data-tab="quiz">Quiz</button>
          <button class="tab" data-tab="cards">Karten</button>
          <button class="tab" data-tab="open">Stift</button>
          <button class="tab" data-tab="dash">Dash</button>
          <button class="tab" data-tab="topics">Themen</button>
        </div>
      </div>
      <div id="quizTab"><div class="card"><div id="quizBody"></div></div></div>
      <div id="cardsTab" class="hidden"><div class="card"><div id="cardBody" onclick="flipCard()"></div></div></div>
      <div id="openTab" class="hidden"><div class="card"><div id="openBody"></div></div></div>
      <div id="dashTab" class="hidden"><div class="card"><h3>Dashboard</h3><div id="dashTop"></div><div id="dashList" style="margin-top:12px"></div></div></div>
      <div id="topicsTab" class="hidden"><div class="card"><h3>Importierte Themen</h3><div id="topicBoxes"></div><hr style="margin:15px 0;border:0;border-top:1px solid var(--border)"><h3>JSON anhängen</h3><textarea id="jsonText" rows="6" placeholder="JSON hier einfügen..."></textarea><button class="primary" id="importJsonBtn" style="margin-top:12px;width:100%">Thema hinzufügen</button></div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================
   🚨 KONFIGURATION
========================= */
const CONFIG = {
  SUPABASE_KEY: "sb_publishable_llN5XLpnGZW2eIkgYoqmoA_1ax0QLG9", 
  SUPABASE_URL: "https://nujchjlrndwitadigzvs.supabase.co",
  GEMINI_MODEL: "gemini-2.5-flash" 
};

/* =========================
   🔗 CLOUD LOGIC (v134)
========================= */
const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
let syncId = localStorage.getItem("app_sync_id") || "";

function updateBadge(status) {
  const b = document.getElementById("syncStatusBadge");
  if(status === "ok") { b.textContent = "Cloud OK"; b.style.background = "#dcfce7"; b.style.color = "#166534"; }
  else if(status === "syncing") { b.textContent = "Speichert..."; b.style.background = "#fef08a"; b.style.color = "#854d0e"; }
  else { b.textContent = "Lokal"; b.style.background = "#f3f4f6"; b.style.color = "#6b7280"; }
}

async function saveToCloud() {
  if(!syncId) return; updateBadge("syncing");
  try { await supabaseClient.from("progress").upsert({id: syncId, data: { profile, progress, all_data: APP.dataByProfile }, updated_at: new Date().toISOString()}); updateBadge("ok"); } catch (e) { updateBadge("err"); }
}

async function loadFromCloud() {
  if(!syncId) return;
  try {
    const { data } = await supabaseClient.from("progress").select("data").eq("id", syncId).maybeSingle();
    if (data && data.data) {
      if(data.data.all_data) APP.dataByProfile = data.data.all_data;
      if(data.data.progress) progress = data.data.progress;
      localStorage.setItem("v109_dataByProfile", JSON.stringify(APP.dataByProfile));
      renderAll(); updateBadge("ok");
    }
  } catch (e) { updateBadge("err"); }
}

/* =========================
   APP CORE (v127 RESTORED)
========================= */
const APP={profiles:[{id:"stefan",name:"Stefan"},{id:"lolla",name:"Lolla"}],dataByProfile:JSON.parse(localStorage.getItem("v109_dataByProfile")||"{}")};
const DEFAULT_PROGRESS={points:0,streak:0,status:{},ratings:{}};
let profile="stefan",progress=JSON.parse(localStorage.getItem("master_lernapp_v109_"+profile)||JSON.stringify(DEFAULT_PROGRESS));
let area="Alle Oberthemen",topic="Alle Unterthemen",selected=[],revealed=false,flashRevealed=false,openText="",openResult=null;

const canvas=document.createElement("canvas"); canvas.width=1800; canvas.height=1200; canvas.id="drawCanvas";
const cctx=canvas.getContext("2d"); cctx.fillStyle="#fff"; cctx.fillRect(0,0,1800,1200); cctx.lineCap="round"; cctx.lineJoin="round";
let tool="pen",brushSize=4,scale=0.6,offsetX=0,offsetY=0,pointers=new Map(),drawLast=null,gestureStart=null;

function $(id){return document.getElementById(id)}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function saveDataByProfile(){localStorage.setItem("v109_dataByProfile",JSON.stringify(APP.dataByProfile))}
function saveProgress(){localStorage.setItem("master_lernapp_v109_"+profile,JSON.stringify(progress)); saveToCloud(); renderHeader();}

function currentDataList(){ let l = APP.dataByProfile[profile]; if(!l) return []; return Array.isArray(l) ? l : [l]; }
function allItems(){
  const dataList = currentDataList(); const out = [];
  dataList.forEach((data, dIdx) => {
    (data.unterthemen||[]).forEach((u, ui) => {
      (u.fragen||[]).forEach((q, qi) => {
        let opt = q.quiz_optionen || [...(q.kernpunkte||[]).slice(0,3).map(x=>({text:x,correct:true})),{text:"Falsch A",correct:false},{text:"Falsch B",correct:false}].slice(0,5);
        out.push({id:`${profile}_${dIdx}_${ui}_${qi}`, area:data.ueberthema, topic:u.name, question:q.frage, explanation:q.antwort, merksatz:q.merksatz, optionMeta:opt});
      });
    });
  }); return out;
}

function areas(){return ["Alle Oberthemen",...new Set(allItems().map(i=>i.area))]}
function topics(){return ["Alle Unterthemen",...new Set(allItems().filter(i=>area==="Alle Oberthemen"||i.area===area).map(i=>i.topic))]}
function filtered(){return allItems().filter(i=>(area==="Alle Oberthemen"||i.area===area)&&(topic==="Alle Unterthemen"||i.topic===topic))}
function currentItem(){ const a=filtered(); return a.find(x=>!progress.ratings?.[x.id]) || a[0]; }
function resetStudyState(){selected=[];revealed=false;flashRevealed=false;openText="";openResult=null;clearCanvas()}

/* KI API & SPEECH */
async function geminiImage(prompt,mimeType,data){
  const k=localStorage.getItem("ml_final_gemini_key"); if(!k) return "Key fehlt."; 
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${k}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{role:"user",parts:[{text:prompt},{inlineData:{mimeType,data}}]}]})});
  const d=await res.json(); return d.candidates[0].content.parts[0].text;
}

/* RENDERING (v127 RESTORED) */
function renderQuiz(){
  const item=currentItem(),box=$("quizBody"); if(!item){box.innerHTML='Kein Thema.'; return}
  const optHtml=item.optionMeta.map((o,i)=>{
    const active=selected.includes(i)?" active":""; 
    let cls=""; if(revealed){if(o.correct) cls=" correct"; else if(selected.includes(i)) cls=" wrong"} 
    return `<button class="option${active}${cls}" onclick="handleQuizOpt(${i})" ${revealed?'disabled':''}>${esc(o.text)}</button>`
  }).join("");
  box.innerHTML=`<div class="focusQuestion"><h2>${esc(item.question)}</h2></div><div style="margin-top:14px">${optHtml}<div class="toolRow">${!revealed?'<button class="primary" onclick="checkQuiz()">Prüfen</button>':''}<button onclick="alert('Coach kommt bald wieder!')">KI Coach</button></div>${revealed?renderRating(item):""}${revealed?`<div class="good">${esc(item.explanation)}</div>`:""}`;
}
window.handleQuizOpt=i=>{if(revealed)return; selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i]; renderQuiz();};
window.checkQuiz=()=>{revealed=true; progress.status[currentItem().id]="known"; renderQuiz(); saveProgress();};

function renderCards(){
  const item=currentItem(),box=$("cardBody"); if(!item){box.innerHTML='Kein Thema.'; return}
  box.innerHTML=`<div class="focusQuestion" style="cursor:pointer; min-height:180px"><h2>${flashRevealed?esc(item.explanation):esc(item.question)}</h2></div><div class="muted" style="text-align:center; margin-top:10px">Klicken zum Drehen</div>${flashRevealed?renderRating(item):""}`;
}
window.flipCard=()=>{ flashRevealed=!flashRevealed; renderCards(); };

function renderOpen(){
  const item=currentItem(),box=$("openBody"); if(!item){box.innerHTML='Kein Thema.'; return}
  box.innerHTML=`<div class="focusQuestion"><h2>${esc(item.question)}</h2></div><textarea id="oAns" oninput="openText=this.value" placeholder="Antwort tippen..." style="height:100px">${esc(openText)}</textarea><div class="toolRow"><button class="primary" onclick="evalOpen()">Bewerten</button><span id="oStatus" class="muted"></span></div>${revealed?renderRating(item):""}${revealed?`<div class="soft">${openResult || esc(item.explanation)}</div>`:""}<div class="card" style="margin-top:14px"><div onclick="$('#inkB').classList.toggle('hidden'); mountCanvas()" style="cursor:pointer;font-weight:700">Stifteingabe +/-</div><div id="inkB" class="hidden"><div class="canvasWrap"><div class="canvasToolbar"><button onclick="tool='pen'">Stift</button><button onclick="tool='eraser'">Eraser</button><button onclick="clearCanvas()">Leeren</button><button class="primary" onclick="evalCanvas()">Zeichnung bewerten</button></div><div class="canvasViewport" id="cVp"></div></div></div></div>`;
}
window.evalCanvas=async()=>{ revealed=true; renderOpen(); const img=exportCanvasTrimmed(); try { $("oStatus").textContent="KI Bild-Scan..."; openResult=await geminiImage(`Lies Handschrift: Frage ${currentItem().question}, Lösung ${currentItem().explanation}`, "image/png", img.base64); renderOpen(); } catch(e){} };

function renderRating(item){
  return `<div class="ratingRow"><button class="ratingBtn" style="background:#dcfce7" onclick="setRate('${item.id}','easy')">Einfach</button><button class="ratingBtn" style="background:#fef9c3" onclick="setRate('${item.id}','med')">Mittel</button><button class="ratingBtn" style="background:#fee2e2" onclick="setRate('${item.id}','hard')">Schwer</button></div>`;
}
window.setRate=(id,l)=>{ if(!progress.ratings) progress.ratings={}; progress.ratings[id]=l; saveProgress(); resetStudyState(); renderAll(); };

/* DASHBOARD (v127) */
function renderDash(){
  const box=$("dashTop"); const items=allItems(); const learned=Object.keys(progress.status).length;
  box.innerHTML=`Gelernt: ${learned} / ${items.length}`;
  $("dashList").innerHTML=items.map(i=>`<div class="soft" style="margin-bottom:6px">${esc(i.question)}</div>`).join("");
}

/* S-PEN / ZOOM ENGINE (v127 ORIGINAL) */
function mountCanvas(){ const vp=$("cVp"); if(vp && !vp.contains(canvas)) vp.appendChild(canvas); updateCanvas(); }
function updateCanvas(){ canvas.style.transform=`translate(${offsetX}px, ${offsetY}px) scale(${scale})`; }
function clearCanvas(){ cctx.setTransform(1,0,0,1,0,0); cctx.fillStyle="#fff"; cctx.fillRect(0,0,canvas.width,canvas.height); }
function clientToCanvas(e){ const v=$("cVp").getBoundingClientRect(); return {x:(e.clientX-v.left-offsetX)/scale,y:(e.clientY-v.top-offsetY)/scale}; }
canvas.addEventListener("pointerdown", e=>{
  canvas.setPointerCapture(e.pointerId); pointers.set(e.pointerId,e);
  if(e.pointerType==='pen'||e.pointerType==='mouse'){ if(pointers.size===1) drawLast=clientToCanvas(e); }
  else if(pointers.size===1) gestureStart={px:e.clientX, py:e.clientY, ox:offsetX, oy:offsetY};
  else if(pointers.size===2){ const a=[...pointers.values()]; gestureStart={dist:Math.hypot(a[0].clientX-a[1].clientX, a[0].clientY-a[1].clientY), sc:scale, ox:offsetX, oy:offsetY}; }
});
canvas.addEventListener("pointermove", e=>{
  if(!pointers.has(e.pointerId)) return; pointers.set(e.pointerId,e);
  if((e.pointerType==='pen'||e.pointerType==='mouse') && drawLast){
    const p=clientToCanvas(e); cctx.save();
    if(tool==='eraser'){ cctx.globalCompositeOperation="destination-out"; cctx.lineWidth=40; }
    else { cctx.strokeStyle="#111"; cctx.lineWidth=brushSize; }
    cctx.beginPath(); cctx.moveTo(drawLast.x,drawLast.y); cctx.lineTo(p.x,p.y); cctx.stroke(); cctx.restore(); drawLast=p;
  } else if(e.pointerType==='touch' && gestureStart){
    if(pointers.size===1){ offsetX=gestureStart.ox+(e.clientX-gestureStart.px); offsetY=gestureStart.oy+(e.clientY-gestureStart.py); }
    else if(pointers.size===2){ const a=[...pointers.values()]; const d=Math.hypot(a[0].clientX-a[1].clientX, a[0].clientY-a[1].clientY); scale=Math.max(0.2, Math.min(3, gestureStart.sc * (d/gestureStart.dist))); }
    updateCanvas();
  }
});
canvas.addEventListener("pointerup", e=>{ pointers.delete(e.pointerId); drawLast=null; if(pointers.size<2) gestureStart=null; });

function exportCanvasTrimmed(){
  const src=cctx.getImageData(0,0,canvas.width,canvas.height); let minX=canvas.width,minY=canvas.height,maxX=0,maxY=0;
  for(let y=0;y<canvas.height;y++){for(let x=0;x<canvas.width;x++){const idx=(y*canvas.width+x)*4; if(src.data[idx+3]>0 && src.data[idx]<250){if(x<minX)minX=x; if(y<minY)minY=y; if(x>maxX)maxX=x; if(y>maxY)maxY=y}}}
  const w=(maxX-minX)+40, h=(maxY-minY)+40; const tmp=document.createElement("canvas"); tmp.width=w; tmp.height=h;
  tmp.getContext("2d").drawImage(canvas,minX-20,minY-20,w,h,0,0,w,h); return {base64: tmp.toDataURL("image/png").split(",")[1]};
}

/* THEMEN IMPORT */
function renderTopics(){
  const list = currentDataList(); const box = $("topicBoxes"); box.innerHTML = "";
  list.forEach((data, idx) => {
    const div = document.createElement("div"); div.className = "topicItem";
    div.innerHTML = `<div><strong>${esc(data.ueberthema)}</strong></div><button style="color:red" onclick="delTheme(${idx})">Löschen</button>`;
    box.appendChild(div);
  });
}
window.delTheme=i=>{if(confirm("Löschen?")){let l=currentDataList(); l.splice(i,1); APP.dataByProfile[profile]=l; saveDataByProfile(); renderAll(); saveToCloud();}};
$("importJsonBtn").onclick=()=>{
  try { const newData=JSON.parse($("jsonText").value.trim()); let l=currentDataList(); l.push(newData); APP.dataByProfile[profile]=l; saveDataByProfile(); renderAll(); saveToCloud(); $("jsonText").value=""; } catch(e){ alert("JSON Fehler!"); }
};

/* RENDER ALL */
function renderHeader(){
  const vals=Object.values(progress.status),known=vals.filter(v=>v==="known").length;
  $("pointsBadge").textContent=progress.points+" P"; $("accBadge").textContent="Q: "+(vals.length?Math.round((known/vals.length)*100):0)+"%"; $("countsBadge").textContent=`Gewusst ${known} · Gesamt ${allItems().length}`;
}
function renderAll(){ renderHeader(); renderProfiles(); renderSelectors(); renderQuiz(); renderCards(); renderOpen(); renderTopics(); renderDash(); }
function renderProfiles(){const box=$("profiles"); box.innerHTML=""; APP.profiles.forEach(p=>{const btn=document.createElement("button"); btn.className=profile===p.id?"primary":""; btn.textContent=p.name; btn.onclick=()=>{profile=p.id;progress=JSON.parse(localStorage.getItem("master_lernapp_v109_"+profile)||JSON.stringify(DEFAULT_PROGRESS));resetStudyState();renderAll()}; box.appendChild(btn)})}
function renderSelectors(){const aSel=$("areaSelect"); aSel.innerHTML=areas().map(a=>`<option value="${a}">${a}</option>`).join(""); aSel.value=area; aSel.onchange=()=>{area=aSel.value;topic="Alle Unterthemen";resetStudyState();renderAll()}; const tSel=$("topicSelect"); tSel.innerHTML=topics().map(t=>`<option value="${t}">${t}</option>`).join(""); tSel.value=topic; tSel.onchange=()=>{topic=tSel.value;resetStudyState();renderAll()}}

document.querySelectorAll(".tab").forEach(btn=>{ btn.onclick=()=>{
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active")); btn.classList.add("active");
  ["quizTab","cardsTab","openTab","dashTab","topicsTab"].forEach(id=>$(id).classList.add("hidden"));
  $(btn.dataset.tab+"Tab").classList.remove("hidden");
  if(btn.dataset.tab==='open') mountCanvas();
}});

document.addEventListener("DOMContentLoaded", () => { 
  if(syncId) loadFromCloud(); else renderAll(); 
});
$("saveKeysBtn").onclick=()=>{ localStorage.setItem("ml_final_gemini_key", $("geminiKey").value.trim()); alert("Key gespeichert!"); };
$("saveSyncIdBtn").onclick=()=>{ syncId=$("syncIdInput").value.trim(); localStorage.setItem("app_sync_id", syncId); loadFromCloud(); };
</script>
</body>
</html>
